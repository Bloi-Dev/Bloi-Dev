name: Update Chess Card

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chess-card:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python scripts/update_chess_card.py

      - name: Commit updated chess card
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/chess-card.svg
          git commit -m "Update Chess.com player card" || echo "No changes to commit"
          git push
